name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: pip install .[dev]

      - name: Smoke test (--help)
        run: porypal-fe8 --help

      - name: Import check
        run: python -c "import palette_tool; assert callable(palette_tool.main); print('import ok')"

      - name: Self-contained extract test
        run: |
          python tests/gen_test_png.py tmp.png
          porypal-fe8 extract tmp.png -o tmp.pal -n 16
          python tests/check_pal.py tmp.pal

      - name: Run pytest suite
        run: pytest -v

      - name: Build package (wheel + sdist)
        run: |
          pip install build
          python -m build

      - name: Check build artifacts
        shell: bash
        run: |
          ls -l dist/
          test -n "$(ls dist/*.whl 2>/dev/null)" || { echo "no wheel built"; exit 1; }
          test -n "$(ls dist/*.tar.gz 2>/dev/null)" || { echo "no sdist built"; exit 1; }
